{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<style>
    :root { --navy: #1B2631; --paper-white: #FFFFFF; --accent-crimson: #922B21; --input-border: #ABB2B9; }
    body { background-color: #F4F6F7; font-family: "Times New Roman", Times, serif, "Kalpurush", Arial, sans-serif; }
    .form-container { max-width: 1000px; margin: 20px auto; background: white; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
    .form-banner { background: var(--navy); color: white; padding: 25px; text-align: center; border-bottom: 4px solid var(--accent-crimson); }
    .form-content { padding: 30px; }
    
    .grid-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 15px; }
    
    .field-box { display: flex; border: 1px solid var(--input-border); min-height: 45px; position: relative; flex-direction: column; }
    .field-box-inner { display: flex; flex: 1; }
    .field-box label { background: var(--navy); color: #fff; padding: 0 12px; min-width: 140px; display: flex; align-items: center; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .field-box input, .field-box select { flex: 1; border: none; padding: 10px; outline: none; font-size: 14px; width: 100%; }
    
    .suggestion-list { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; max-height: 250px; overflow-y: auto; z-index: 1000; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; display: flex; flex-direction: column; }
    .suggestion-item span { font-size: 11px; color: #7F8C8D; }
    .suggestion-item:hover { background: #F2F4F4; color: var(--accent-crimson); font-weight: bold; }
    
    .section-title { background: #EBEDEF; padding: 12px; font-weight: 700; border-left: 5px solid var(--accent-crimson); margin: 30px 0 15px; display: flex; justify-content: space-between; align-items: center; }
    
    #groupSection { display: none; }
    .btn-submit { background: var(--accent-crimson); color: white; padding: 18px; border: none; font-weight: 700; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 30px; border-radius: 5px; transition: 0.3s; }
    .btn-submit:hover { background: #7B241C; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    /* New Institute Styles */
    .new-inst-area { background: #E8F8F5; border: 2px dashed #27AE60; padding: 20px; margin-top: 15px; border-radius: 8px; display: none; }
    .new-inst-title { color: #145A32; font-weight: bold; margin-bottom: 12px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .wa-btn { background: #25D366; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; transition: 0.3s; }
    .wa-btn:hover { background: #1eb954; }

    /* Photo capture buttons */
    .photo-choose-wrap { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .photo-choose-wrap .wa-btn, .photo-recrop-wrap .wa-btn { margin-top: 0; max-width: 220px; flex: 1 1 180px; }
</style>

<div class="form-container">
    <div class="form-banner">
        <h2>Scholarship Application Form - 2026</h2>
        <p>The Brilliants Foundation, Bogura</p>
    </div>

    <form action="{{ url_for('apply') }}" method="POST" enctype="multipart/form-data" class="form-content" id="scholarshipForm" onsubmit="return validateSubmission()">
        
        <div class="grid-row">
            <div class="field-box">
                <div class="field-box-inner">
                    <label>Academic Class</label>
                    <select name="student_class" id="classSelector" onchange="toggleGroup()" required>
                        <option value="" disabled selected>Select Class</option>
                        {% for n in range(5, 10) %} <option value="{{ n }}">Class {{ n }}</option> {% endfor %}
                    </select>
                </div>
            </div>
            <div class="field-box" id="groupSection">
                <div class="field-box-inner">
                    <label>Group</label>
                    <select name="category">
                        <option value="General">General</option>
                        <option value="Science">Science</option>
                        <option value="Humanities">Humanities</option>
                        <option value="Commerce">Commerce</option>
                    </select>
                </div>
            </div>
            <div class="field-box">
                <div class="field-box-inner">
                    <label>Exam Center</label>
                    <select name="center_code" required>
                        <option value="" disabled selected>Select Center</option>
                        {% for c in centers %} <option value="{{ c.center_code }}">{{ c.center_code }} - {{ c.center_name_bn }}</option> {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="section-title">Personal Information</div>
        <div class="grid-row">
            <div class="field-box"><div class="field-box-inner"><label>Name (English)</label><input type="text" name="name_en" required></div></div>
            <div class="field-box"><div class="field-box-inner"><label>নাম (বাংলা)</label><input type="text" name="name_bn" required></div></div>
            <div class="field-box">
                <div class="field-box-inner">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="grid-row">
            <div class="field-box"><div class="field-box-inner"><label>Father (EN)</label><input type="text" name="father_en" required></div></div>
            <div class="field-box"><div class="field-box-inner"><label>পিতার নাম (বাংলা)</label><input type="text" name="father_bn" required></div></div>
        </div>
        <div class="grid-row">
            <div class="field-box"><div class="field-box-inner"><label>Mother (EN)</label><input type="text" name="mother_en" required></div></div>
            <div class="field-box"><div class="field-box-inner"><label>মাতার নাম (বাংলা)</label><input type="text" name="mother_bn" required></div></div>
        </div>
        <div class="grid-row">
            <div class="field-box"><div class="field-box-inner"><label>Mobile No</label><input type="tel" name="mobile" pattern="[0-9]{11}" placeholder="017XXXXXXXX" required></div></div>
            <div class="field-box"><div class="field-box-inner"><label>Date of Birth</label><input type="date" name="dob" required></div></div>
        </div>

        <div class="section-title">Institutional Information</div>
        <div class="grid-row">
            <div class="field-box">
                <div class="field-box-inner">
                    <label>Institution Type</label>
                    <select name="institute_type" id="instituteType" required>
                        <option value="School">School (স্কুল)</option>
                        <option value="Madrasha">Madrasha (মাদ্রাসা)</option>
                    
                    </select>
                </div>
            </div>
        </div>
        <div class="grid-row">
            <div class="field-box">
                <div class="field-box-inner">
                    <label>Institution (EN)</label>
                    <input type="text" id="instSearchEn" name="institute_en" autocomplete="off" placeholder="Search school..." required>
                    <div id="enSuggestions" class="suggestion-list"></div>
                </div>
            </div>
            <div class="field-box">
                <div class="field-box-inner">
                    <label>প্রতিষ্ঠান (বাংলা)</label>
                    <input type="text" id="instSearchBn" name="institute_bn" autocomplete="off" placeholder="স্কুল সার্চ করুন..." required>
                    <div id="bnSuggestions" class="suggestion-list"></div>
                </div>
            </div>
        </div>

        <div id="newInstSection" class="new-inst-area">
            <div class="new-inst-title">
                <i class="fas fa-school"></i> স্কুলের নাম খুঁজে পাওয়া যায়নি? এখানে তথ্য দিন:
            </div>
            <div class="grid-row">
                <div class="field-box"><div class="field-box-inner"><label>School Name (EN)</label><input type="text" id="addNameEn" placeholder="Enter Full Name"></div></div>
                <div class="field-box"><div class="field-box-inner"><label>স্কুলের নাম (বাংলা)</label><input type="text" id="addNameBn" placeholder="বাংলা নাম লিখুন"></div></div>
                <div class="field-box"><div class="field-box-inner"><label>Location</label><input type="text" id="addLocation" placeholder="Upazila, District"></div></div>
            </div>
            <a href="javascript:void(0)" onclick="sendInstituteRequest()" class="wa-btn">
                <i class="fab fa-whatsapp"></i> Request to Add via WhatsApp
            </a>
        </div>

        <div class="grid-row" style="margin-top: 20px;">
            <div class="upload-zone" style="border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 8px;">
                <label style="font-size:11px; font-weight:bold; display:block; margin-bottom:8px;">STUDENT PHOTO</label>

                <!-- Hidden file inputs: one for gallery, one forcing the camera -->
                <input type="file" id="photoInput" accept="image/*" style="display:none;">
                <input type="file" id="photoInputCamera" accept="image/*" capture="user" style="display:none;">
                <input type="hidden" name="photo_url" id="photoUrlField">

                <div id="photoChooseWrap" class="photo-choose-wrap">
                    <button type="button" id="galleryBtn" class="wa-btn" style="background:var(--navy);">
                        <i class="fas fa-image"></i> Choose from Gallery
                    </button>
                    <button type="button" id="cameraBtn" class="wa-btn" style="background:var(--accent-crimson);">
                        <i class="fas fa-camera"></i> Take Photo
                    </button>
                </div>

                <div id="photoPreviewWrap" style="display:none; margin-top:15px; flex-direction:column; align-items:center; gap:10px;">
                    <img id="photoPreviewImg" src="" alt="Preview" style="width:120px; height:120px; object-fit:cover; border-radius:8px; border:2px solid var(--navy);">
                    <div class="photo-recrop-wrap" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
                        <button type="button" id="recropGalleryBtn" class="wa-btn" style="background:#34495e;">
                            <i class="fas fa-image"></i> Re-select from Gallery
                        </button>
                        <button type="button" id="recropCameraBtn" class="wa-btn" style="background:#34495e;">
                            <i class="fas fa-camera"></i> Retake Photo
                        </button>
                    </div>
                </div>

                <div id="uploadProgressWrap" style="display:none; margin-top:15px;">
                    <div style="background:#eee; border-radius:20px; overflow:hidden; height:18px; width:100%;">
                        <div id="uploadProgressBar" style="background:var(--accent-crimson); height:100%; width:0%; transition: width 0.2s; display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:bold;">0%</div>
                    </div>
                    <div id="uploadStatusText" style="font-size:12px; color:#7F8C8D; margin-top:6px;">Uploading photo...</div>
                </div>
            </div>
        </div>

        <!-- Crop Modal -->
        <div id="cropModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:5000; align-items:center; justify-content:center;">
            <div style="background:#fff; border-radius:10px; padding:20px; width:95%; max-width:450px;">
                <h3 style="margin:0 0 15px; color: var(--navy); text-align:center;">Crop Your Photo</h3>
                <div style="max-height:60vh; overflow:hidden;">
                    <img id="cropImage" src="" style="max-width:100%; display:block;">
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button type="button" id="cropCancelBtn" style="flex:1; padding:12px; border:1px solid #ccc; background:#f4f4f4; border-radius:5px; cursor:pointer; font-weight:600;">Cancel</button>
                    <button type="button" id="cropConfirmBtn" style="flex:1; padding:12px; border:none; background:var(--accent-crimson); color:#fff; border-radius:5px; cursor:pointer; font-weight:600;">Crop & Upload</button>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Submit Application</button>
    </form>
</div>

<script>
    const institutes = {{ institutes|tojson }};
    const enInput = document.getElementById('instSearchEn');
    const bnInput = document.getElementById('instSearchBn');
    const enSuggest = document.getElementById('enSuggestions');
    const bnSuggest = document.getElementById('bnSuggestions');
    const newInstBox = document.getElementById('newInstSection');

    let isValidInstitution = false;

    // ১. সার্চ এবং নতুন স্কুল সেকশন কন্ট্রোল
    function setupSearch(inputEl, suggestEl, filterKey) {
        inputEl.addEventListener('input', function() {
            const val = this.value.toLowerCase();
            isValidInstitution = false;
            suggestEl.innerHTML = '';
            
            if (!val) { 
                suggestEl.style.display = 'none'; 
                newInstBox.style.display = 'none';
                return; 
            }

            const filtered = institutes.filter(i => i[filterKey].toLowerCase().includes(val));
            
            // যদি লিস্টে না পাওয়া যায়, তবে "Add New" সেকশন দেখাবে
            newInstBox.style.display = (filtered.length === 0) ? 'block' : 'none';

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<strong>${item.name}</strong><span>${item.bn || ''}</span>`;
                div.onclick = () => {
                    enInput.value = item.name;
                    bnInput.value = item.bn || '';
                    isValidInstitution = true;
                    enSuggest.style.display = 'none';
                    bnSuggest.style.display = 'none';
                    newInstBox.style.display = 'none';
                };
                suggestEl.appendChild(div);
            });
            suggestEl.style.display = filtered.length ? 'block' : 'none';
        });
    }

    setupSearch(enInput, enSuggest, 'name');
    setupSearch(bnInput, bnSuggest, 'bn');

    // ২. হোয়াটসঅ্যাপ মেসেজ পাঠানো
    function sendInstituteRequest() {
        const nameEn = document.getElementById('addNameEn').value || enInput.value;
        const nameBn = document.getElementById('addNameBn').value || bnInput.value;
        const loc = document.getElementById('addLocation').value || document.getElementById('pre_t').value;
        
        if(!nameEn || !nameBn) {
            alert("দয়া করে স্কুলের নাম ইংরেজিতে এবং বাংলায় লিখুন।");
            return;
        }

        const text = `আসসালামু আলাইকুম, Brilliants Foundation.\nআমার স্কুলটি লিস্টে নেই। দয়া করে নিচের তথ্যটি যুক্ত করুন:\n\nস্কুলের নাম (EN): ${nameEn}\nস্কুলের নাম (BN): ${nameBn}\nলোকেশন: ${loc}`;
        window.open(`https://wa.me/8801400461284?text=${encodeURIComponent(text)}`, '_blank');
    }

    // ৩. সাবমিশন লজিক
    function validateSubmission() {
        if (document.getElementById('pass').value !== document.getElementById('confirm_pass').value) {
            alert("পাসওয়ার্ড মেলেনি!"); return false;
        }
        if (!isValidInstitution) {
            alert("দয়া করে লিস্ট থেকে আপনার স্কুলটি সিলেক্ট করুন। যদি না থাকে, তবে নিচের ফর্মে তথ্য দিয়ে হোয়াটসঅ্যাপে জানান।");
            return false;
        }
        if (!document.getElementById('photoUrlField').value) {
            alert("দয়া করে ছাত্র/ছাত্রীর ছবি আপলোড করুন এবং আপলোড সম্পূর্ণ হওয়া পর্যন্ত অপেক্ষা করুন।");
            return false;
        }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Processing... Please wait";
        return true;
    }

    // ৪. ফটো ক্রপ এবং প্রোগ্রেস বার সহ আপলোড (গ্যালারি + ক্যামেরা দুটোই সাপোর্ট করে)
    let cropper = null;
    const photoInput = document.getElementById('photoInput');
    const photoInputCamera = document.getElementById('photoInputCamera');
    const galleryBtn = document.getElementById('galleryBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const recropGalleryBtn = document.getElementById('recropGalleryBtn');
    const recropCameraBtn = document.getElementById('recropCameraBtn');
    const photoChooseWrap = document.getElementById('photoChooseWrap');
    const cropModal = document.getElementById('cropModal');
    const cropImage = document.getElementById('cropImage');
    const cropCancelBtn = document.getElementById('cropCancelBtn');
    const cropConfirmBtn = document.getElementById('cropConfirmBtn');
    const photoPreviewWrap = document.getElementById('photoPreviewWrap');
    const photoPreviewImg = document.getElementById('photoPreviewImg');
    const uploadProgressWrap = document.getElementById('uploadProgressWrap');
    const uploadProgressBar = document.getElementById('uploadProgressBar');
    const uploadStatusText = document.getElementById('uploadStatusText');
    const photoUrlField = document.getElementById('photoUrlField');
    const submitBtn = document.getElementById('submitBtn');

    // বাটনগুলো হিডেন ফাইল ইনপুট ট্রিগার করে
    galleryBtn.addEventListener('click', () => photoInput.click());
    cameraBtn.addEventListener('click', () => photoInputCamera.click());
    recropGalleryBtn.addEventListener('click', () => photoInput.click());
    recropCameraBtn.addEventListener('click', () => photoInputCamera.click());

    function handlePhotoFile(file) {
        if (!file) return;

        if (!file.type.startsWith('image/')) {
            alert("দয়া করে শুধুমাত্র ইমেজ ফাইল নির্বাচন করুন।");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            cropImage.src = e.target.result;
            cropModal.style.display = 'flex';

            if (cropper) cropper.destroy();
            cropper = new Cropper(cropImage, {
                aspectRatio: 1,
                viewMode: 1,
                autoCropArea: 1,
                background: false
            });
        };
        reader.readAsDataURL(file);
    }

    photoInput.addEventListener('change', function() {
        handlePhotoFile(this.files[0]);
    });
    photoInputCamera.addEventListener('change', function() {
        handlePhotoFile(this.files[0]);
    });

    cropCancelBtn.addEventListener('click', function() {
        cropModal.style.display = 'none';
        if (cropper) { cropper.destroy(); cropper = null; }
        photoInput.value = '';
        photoInputCamera.value = '';
    });

    cropConfirmBtn.addEventListener('click', function() {
        if (!cropper) return;

        const canvas = cropper.getCroppedCanvas({
            width: 400,
            height: 400,
            imageSmoothingQuality: 'high'
        });

        canvas.toBlob(function(blob) {
            cropModal.style.display = 'none';
            if (cropper) { cropper.destroy(); cropper = null; }

            photoPreviewImg.src = URL.createObjectURL(blob);
            photoChooseWrap.style.display = 'none';
            photoPreviewWrap.style.display = 'flex';

            uploadCroppedImage(blob);
        }, 'image/jpeg', 0.9);
    });

    function uploadCroppedImage(blob) {
        const formData = new FormData();
        formData.append('photo', blob, 'photo.jpg');

        uploadProgressWrap.style.display = 'block';
        uploadProgressBar.style.width = '0%';
        uploadProgressBar.innerText = '0%';
        uploadStatusText.innerText = 'Uploading photo...';
        photoUrlField.value = '';
        submitBtn.disabled = true;

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '{{ url_for("api_upload_photo") }}', true);

        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                uploadProgressBar.style.width = percent + '%';
                uploadProgressBar.innerText = percent + '%';
            }
        };

        xhr.onload = function() {
            submitBtn.disabled = false;
            try {
                const res = JSON.parse(xhr.responseText);
                if (xhr.status === 200 && res.success) {
                    photoUrlField.value = res.url;
                    uploadProgressBar.style.width = '100%';
                    uploadProgressBar.innerText = '100%';
                    uploadStatusText.innerHTML = '<i class="fas fa-check-circle" style="color:#27AE60;"></i> Photo uploaded successfully!';
                } else {
                    uploadStatusText.innerHTML = '<span style="color:#922B21;">Upload failed: ' + (res.message || 'Unknown error') + '. Please try again.</span>';
                    photoUrlField.value = '';
                }
            } catch (err) {
                uploadStatusText.innerHTML = '<span style="color:#922B21;">Upload failed. Please try again.</span>';
                photoUrlField.value = '';
            }
        };

        xhr.onerror = function() {
            submitBtn.disabled = false;
            uploadStatusText.innerHTML = '<span style="color:#922B21;">Network error. Please try again.</span>';
            photoUrlField.value = '';
        };

        xhr.send(formData);
    }


    function toggleGroup() {
        const val = document.getElementById('classSelector').value;
        document.getElementById('groupSection').style.display = (val >= 9) ? "flex" : "none";
    }

    function copyAddress() {
        const check = document.getElementById('same_as_present');
        ['v', 't', 'd'].forEach(f => {
            document.getElementById('per_'+f).value = check.checked ? document.getElementById('pre_'+f).value : "";
        });
    }

    // সাজেশনের বাইরে ক্লিক করলে হাইড করা
    document.addEventListener('click', (e) => {
        if (!enInput.contains(e.target)) enSuggest.style.display = 'none';
        if (!bnInput.contains(e.target)) bnSuggest.style.display = 'none';
    });
</script>
{% endblock %}
